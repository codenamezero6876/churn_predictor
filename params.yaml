sparksession:
  name: "Exploring Customer Churn Dataset"

paths:
  raw_data_path: "data/raw"
  raw_data_file: "customer_churn_dataset-training-master.csv"
  processed_data_path: "data/processed"
  train_data_path: "data/model_data/train"
  test_data_path: "data/model_data/test"
  artifacts_path: "artifacts"
  metrics_path: "metrics"
  model_path: "GBTClassifier_1c8668dd7fc0"

data_preprocessing:
  columns_to_drop:
    - "CustomerID"
  columns_to_dropna:
    - "Support Calls"
    - "Total Spend"
    - "Payment Delay"
  partitions:
    - "Gender"
    - "Subscription Type"
    - "Contract Length"

feature_engineering:
  new_features:
    categorize_from_existing:
      - col_name: "Age"
        labels:
          - name: "Young"
            start: "null"
            end: 40
          - name: "Middle-Aged"
            start: 40
            end: 65
          - name: "Senior"
            start: 65
            end: "null"
      - col_name: "Tenure"
        labels:
          - name: "New"
            start: "null"
            end: 3
          - name: "Early-Stage"
            start: 3
            end: 12
          - name: "Mid-term"
            start: 12
            end: 24
          - name: "Loyal"
            start: 24
            end: "null"
  train_test_split_ratio: 0.2
  random_seed: 42

model_training:
  eval_choice: "accuracy"
  model_choice: "gbt"
  optim_choice: "grid"
  optimization:
    grid:
      rfc:
        numTrees:
          - 20
          - 50
          - 100
        maxDepth:
          - 5
          - 10
          - 20
        featureSubsetStrategy:
          - "auto"
          - "sqrt"
          - "log2"
        impurity:
          - "gini"
          - "entropy"
      gbt:
        maxDepth:
          - 5
          - 10
          - 20
        featureSubsetStrategy:
          - "auto"
          - "sqrt"
          - "log2"

model_evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "roc_auc"
    - "confusion_matrix"
