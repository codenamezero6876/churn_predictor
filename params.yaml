sparksession:
  name: "Exploring Customer Churn Dataset"

old_paths:
  data:
    raw: data/raw
    ingested: data/ingested
    processed: data/processed
    training: data/model_data/train
    testing: data/model_data/test
    visual: data/visual
  artifacts: artifacts
  metrics: metrics

paths:
  data:
    raw: abfss://source_container_name@storage_account_name.dfs.core.windows.net
    ingested: abfss://ingest_container_name@storage_account_name.dfs.core.windows.net
    processed: abfss://process_container_name@storage_account_name.dfs.core.windows.net
    training: abfss://ml_container_name@storage_account_name.dfs.core.windows.net/train
    testing: abfss://ml_container_name@storage_account_name.dfs.core.windows.net/test
    inference: abfss://ml_container_name@storage_account_name.dfs.core.windows.net/inference
    visual: abfss://visual_container_name@storage_account_name.dfs.core.windows.net
  artifacts: abfss://ml_container_name@storage_account_name.dfs.core.windows.net/artifacts
  metrics: abfss://ml_container_name@storage_account_name.dfs.core.windows.net/metrics

mlflow:
  uri: http://0.0.0.0:8000
  experiment_name: churn_predictor
  artifact_path: model-artifact
  registered_model_name: churn_predictor
  registry:
    crit_val: 0.1
    metric: accuracy

data_ingestion:
  save_format: delta

data_preprocessing:
  columns_to_drop:
    - "CustomerID"
  columns_to_dropna:
    - "Support Calls"
    - "Total Spend"
    - "Payment Delay"
  partitions:
    - "Gender"
    - "Subscription Type"
    - "Contract Length"
  is_local: False
  load_format: delta
  save_format: delta

feature_engineering:
  new_features:
    categorize_from_existing:
      - col_name: "Age"
        labels:
          - name: "Young"
            start: "null"
            end: 40
          - name: "Middle-Aged"
            start: 40
            end: 65
          - name: "Senior"
            start: 65
            end: "null"
      - col_name: "Tenure"
        labels:
          - name: "New"
            start: "null"
            end: 3
          - name: "Early-Stage"
            start: 3
            end: 12
          - name: "Mid-term"
            start: 12
            end: 24
          - name: "Loyal"
            start: 24
            end: "null"
  train_test_split_ratio: 0.2
  random_seed: 42
  is_local: False
  load_format: delta
  save_format: delta

model_training:
  eval_choice: "accuracy"
  model_choice: "gbt"
  optim_choice: "grid"
  optimization:
    grid:
      rfc:
        numTrees:
          - 20
          - 50
          - 100
        maxDepth:
          - 5
          - 10
          - 20
        featureSubsetStrategy:
          - "auto"
          - "sqrt"
          - "log2"
        impurity:
          - "gini"
          - "entropy"
      gbt:
        maxDepth:
          - 5
          - 10
          - 20
        featureSubsetStrategy:
          - "auto"
          - "sqrt"
          - "log2"
  load_format: delta
  is_local: False

model_evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "roc_auc"
    - "confusion_matrix"
  load_format: delta
